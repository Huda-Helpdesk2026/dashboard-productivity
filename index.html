<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Productivity Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js v4.4.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-6 border-b border-slate-800 pb-4 flex flex-col xl:flex-row xl:items-center xl:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Agent Dashboard</h1>
                <p class="text-slate-400 text-sm mt-1">Real-time productivity & time metrics monitoring</p>
            </div>
            
            <!-- Kontainer Filter Lengkap (Agent, Day, Week, Month, Date) -->
            <div id="filter-container" class="hidden flex flex-wrap items-center gap-3 bg-slate-800 p-3 rounded-lg border border-slate-700">
                <!-- Filter Agent -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Agent</label>
                    <select id="filter-agent" class="bg-slate-900 text-slate-200 text-xs rounded border border-slate-600 p-1.5 focus:outline-none focus:border-blue-500 w-32">
                        <option value="ALL">All Agents</option>
                    </select>
                </div>
                <!-- Filter Day -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Day</label>
                    <select id="filter-day" class="bg-slate-900 text-slate-200 text-xs rounded border border-slate-600 p-1.5 focus:outline-none focus:border-blue-500 w-28">
                        <option value="ALL">All Days</option>
                    </select>
                </div>
                <!-- Filter Week -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Week</label>
                    <select id="filter-week" class="bg-slate-900 text-slate-200 text-xs rounded border border-slate-600 p-1.5 focus:outline-none focus:border-blue-500 w-28">
                        <option value="ALL">All Weeks</option>
                    </select>
                </div>
                <!-- Filter Month -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Month</label>
                    <select id="filter-month" class="bg-slate-900 text-slate-200 text-xs rounded border border-slate-600 p-1.5 focus:outline-none focus:border-blue-500 w-28">
                        <option value="ALL">All Months</option>
                    </select>
                </div>
                <!-- Filter Date -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Date</label>
                    <select id="filter-date" class="bg-slate-900 text-slate-200 text-xs rounded border border-slate-600 p-1.5 focus:outline-none focus:border-blue-500 w-32">
                        <option value="ALL">All Dates</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Loader -->
        <div id="loader" class="text-center py-12 text-slate-400 text-lg">
            Menyinkronkan data dari Google Sheets...
        </div>

        <!-- Main Content -->
        <div id="dashboard-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Sisi Kiri: Grafik Total Tiket -->
            <div class="lg:col-span-1 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-lg font-semibold text-slate-200 mb-4 tracking-wide text-center lg:text-left">TOTAL PENGERJAAN TIKET</h3>
                <div class="h-80"><canvas id="ticketChart"></canvas></div>
            </div>

            <!-- Sisi Kanan: Tabel Metrik Detail Per Agent -->
            <div class="lg:col-span-2 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl flex flex-col">
                <h3 class="text-lg font-semibold text-slate-200 mb-4 tracking-wide">METRIK WAKTU AGENT (DURASI)</h3>
                
                <div class="overflow-x-auto flex-grow">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400 font-medium">
                                <th class="py-3 px-4">NAME</th>
                                <th class="py-3 px-4 text-center">TICKET</th>
                                <th class="py-3 px-4 text-center">RESPONSE</th>
                                <th class="py-3 px-4 text-right">ART</th>
                                <th class="py-3 px-4 text-right">AHT</th>
                                <th class="py-3 px-4 text-right">TIME SPAN</th>
                            </tr>
                        </thead>
                        <tbody id="agent-table-body" class="divide-y divide-slate-700 text-slate-200">
                            <!-- Diisi oleh Javascript -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
