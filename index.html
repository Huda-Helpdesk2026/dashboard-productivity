<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Productivity Dashboard</title>
    <!-- Tailwind CSS untuk Styling Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js v4.4.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold text-white tracking-tight">Agent Productivity Dashboard</h1>
            <p class="text-slate-400 text-sm mt-1">Real-time monitoring yang terhubung otomatis dengan Google Sheets</p>
        </header>

        <!-- Loader Status -->
        <div id="loader" class="text-center py-12 text-slate-400 text-lg">
            Sinkronisasi data Google Sheets...
        </div>

        <!-- Main Dashboard Content (Hidden before load) -->
        <div id="dashboard-content" class="hidden space-y-8">
            <!-- Grid Grafik Utama -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Chart 1: Jumlah Tiket -->
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                    <h3 class="text-lg font-semibold text-slate-200 mb-4">Total Pengerjaan Tiket</h3>
                    <div class="h-80"><canvas id="ticketChart"></canvas></div>
                </div>

                <!-- Chart 2: Perbandingan Waktu (Menit) -->
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                    <h3 class="text-lg font-semibold text-slate-200 mb-4">Metrik Waktu Agen (Menit)</h3>
                    <div class="h-80"><canvas id="timeMetricsChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Panggil Logika Skrip Aplikasi -->
    <script src="script.js"></script>
</body>
</html>
